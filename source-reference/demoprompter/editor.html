<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
  }

  #panel {
    margin: 8px;
    background: rgba(30, 30, 34, 0.96);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: calc(100% - 16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* Title bar (draggable) */
  #titlebar {
    -webkit-app-region: drag;
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #titlebar .icon { opacity: 0.5; font-size: 14px; }
  #titlebar h1 { font-size: 13px; font-weight: 600; flex: 1; }
  #word-count { font-size: 11px; opacity: 0.4; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 16px;
    flex-shrink: 0;
  }

  /* Text area */
  #text-area {
    flex: 1;
    min-height: 0;
    padding: 12px 16px;
    overflow: hidden;
  }

  textarea {
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    color: #e0e0e0;
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px;
    resize: none;
    outline: none;
    -webkit-app-region: no-drag;
  }

  textarea:focus {
    border-color: rgba(100, 140, 255, 0.3);
  }

  /* Controls */
  #controls {
    padding: 8px 16px;
    flex-shrink: 0;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .slider-row .label {
    font-size: 11px;
    opacity: 0.4;
    width: 14px;
    text-align: center;
  }

  .slider-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }

  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #648cff;
    cursor: pointer;
  }

  .slider-row .value {
    font-size: 11px;
    opacity: 0.4;
    width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Buttons */
  #buttons {
    padding: 8px 16px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  button {
    flex: 1;
    padding: 7px 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px;
    background: rgba(255,255,255,0.04);
    color: #e0e0e0;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  button:hover { background: rgba(255,255,255,0.08); }
  button:active { background: rgba(255,255,255,0.12); }

  button.primary {
    background: rgba(100, 140, 255, 0.15);
    border-color: rgba(100, 140, 255, 0.2);
  }

  button.primary:hover { background: rgba(100, 140, 255, 0.25); }

  #shortcuts {
    padding: 4px 16px 10px;
    font-size: 10px;
    opacity: 0.3;
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }

  #quit-row {
    padding: 0 16px 10px;
    flex-shrink: 0;
  }

  #quit-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    padding: 4px;
  }

  #quit-btn:hover { color: rgba(255,100,100,0.6); }
</style>
</head>
<body>
  <div id="panel">
    <div id="titlebar">
      <span class="icon">&#x2630;</span>
      <h1>DemoPrompter</h1>
      <span id="word-count">0 words</span>
    </div>

    <div class="divider"></div>

    <div id="text-area">
      <textarea id="notes" placeholder="Paste your demo notes here..."></textarea>
    </div>

    <!-- Speed -->
    <div id="controls">
      <div class="slider-row">
        <span class="label">&#x1F422;</span>
        <input type="range" id="speed" min="0.3" max="5" step="0.1" value="1.5">
        <span class="label">&#x1F407;</span>
        <span class="value" id="speed-val">1.5</span>
      </div>

      <!-- Font size -->
      <div class="slider-row">
        <span class="label" style="font-size:9px">A</span>
        <input type="range" id="fontSize" min="14" max="40" step="1" value="22">
        <span class="label" style="font-size:15px">A</span>
        <span class="value" id="fontSize-val">22pt</span>
      </div>

      <!-- Opacity -->
      <div class="slider-row">
        <span class="label">&#x25D0;</span>
        <input type="range" id="opacity" min="0.3" max="1" step="0.05" value="0.82">
        <span class="value" id="opacity-val">82%</span>
      </div>
    </div>

    <div class="divider"></div>

    <div id="buttons">
      <button id="play-btn" class="primary">
        <span id="play-icon">&#9654;</span>
        <span id="play-label">Play</span>
      </button>
      <button id="reset-btn">&#x21BA; Reset</button>
      <button id="overlay-btn">
        <span id="overlay-icon">&#x1F441;</span>
        <span id="overlay-label">Show</span>
      </button>
    </div>

    <div id="shortcuts">
      <span>Toggle: &#x2318;&#x21E7;P</span>
    </div>

    <div class="divider"></div>

    <div id="quit-row">
      <button id="quit-btn">Quit DemoPrompter</button>
    </div>
  </div>

  <script>
    const notesEl = document.getElementById('notes');
    const speedEl = document.getElementById('speed');
    const fontSizeEl = document.getElementById('fontSize');
    const opacityEl = document.getElementById('opacity');
    const speedVal = document.getElementById('speed-val');
    const fontSizeVal = document.getElementById('fontSize-val');
    const opacityVal = document.getElementById('opacity-val');
    const wordCount = document.getElementById('word-count');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const playLabel = document.getElementById('play-label');
    const resetBtn = document.getElementById('reset-btn');
    const overlayBtn = document.getElementById('overlay-btn');
    const overlayIcon = document.getElementById('overlay-icon');
    const overlayLabel = document.getElementById('overlay-label');
    const quitBtn = document.getElementById('quit-btn');

    let state = {
      text: '',
      speed: 1.5,
      fontSize: 22,
      opacity: 0.82,
      isScrolling: false,
      scrollOffset: 0,
      isOverlayVisible: false
    };

    function updateUI() {
      notesEl.value = state.text;
      speedEl.value = state.speed;
      fontSizeEl.value = state.fontSize;
      opacityEl.value = state.opacity;
      speedVal.textContent = state.speed.toFixed(1);
      fontSizeVal.textContent = state.fontSize + 'pt';
      opacityVal.textContent = Math.round(state.opacity * 100) + '%';
      wordCount.textContent = (state.text.trim() ? state.text.trim().split(/\s+/).length : 0) + ' words';
      playIcon.textContent = state.isScrolling ? '\u23F8' : '\u25B6';
      playLabel.textContent = state.isScrolling ? 'Pause' : 'Play';
      overlayLabel.textContent = state.isOverlayVisible ? 'Hide' : 'Show';
    }

    function sendState(partial) {
      state = { ...state, ...partial };
      updateUI();  // always update UI first regardless of bridge
      try { window.prompter.updateState(partial); } catch(e) { console.error('bridge:', e); }
    }

    // Input handlers
    notesEl.addEventListener('input', () => {
      sendState({ text: notesEl.value });
    });

    speedEl.addEventListener('input', () => {
      sendState({ speed: parseFloat(speedEl.value) });
    });

    fontSizeEl.addEventListener('input', () => {
      sendState({ fontSize: parseInt(fontSizeEl.value) });
    });

    opacityEl.addEventListener('input', () => {
      sendState({ opacity: parseFloat(opacityEl.value) });
    });

    playBtn.addEventListener('click', () => {
      sendState({ isScrolling: !state.isScrolling });
    });

    resetBtn.addEventListener('click', () => {
      sendState({ scrollOffset: 0, isScrolling: false });
    });

    overlayBtn.addEventListener('click', () => {
      try { window.prompter.toggleOverlay(); } catch(e) { console.error('bridge:', e); }
    });

    quitBtn.addEventListener('click', () => {
      try { window.close(); } catch(e) {}
    });

    // Receive state from main process
    window.prompter.onStateUpdate((newState) => {
      state = { ...state, ...newState };
      updateUI();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../shared/styles/glassmorphism.css">
<style>
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #panel {
    margin: 8px;
    background: rgba(30, 30, 34, 0.96);
    border-radius: 12px;
    border: var(--border-subtle);
    backdrop-filter: var(--blur-heavy);
    -webkit-backdrop-filter: var(--blur-heavy);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: calc(100% - 16px);
    box-shadow: var(--shadow-overlay);
  }

  /* Title bar (draggable) */
  #titlebar {
    -webkit-app-region: drag;
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #titlebar .icon { opacity: 0.5; font-size: 14px; }
  #titlebar h1 { font-size: 13px; font-weight: 600; flex: 1; }

  #stats {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 16px;
    flex-shrink: 0;
  }

  /* Text area */
  #text-area {
    flex: 1;
    min-height: 0;
    padding: 12px 16px;
    overflow: hidden;
  }

  #text-area textarea {
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-control);
    color: var(--color-text);
    font-family: var(--font-family);
    font-size: 13px;
    line-height: 1.5;
    padding: 10px;
    resize: none;
    outline: none;
    -webkit-app-region: no-drag;
  }

  #text-area textarea:focus {
    border-color: rgba(136, 170, 255, 0.3);
  }

  /* Controls */
  #controls {
    padding: 8px 16px;
    flex-shrink: 0;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .slider-row .label {
    font-size: 11px;
    opacity: 0.4;
    width: 14px;
    text-align: center;
  }

  .slider-row input[type="range"] {
    flex: 1;
    -webkit-app-region: no-drag;
  }

  .slider-row input[type="range"]::-webkit-slider-thumb {
    background: var(--color-blue);
  }

  .slider-row .value {
    font-size: 11px;
    opacity: 0.4;
    width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Voice tracking toggle */
  #voice-row {
    padding: 4px 16px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    -webkit-app-region: no-drag;
  }

  #voice-row label {
    font-size: 12px;
    color: var(--color-text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #voice-row input[type="checkbox"] {
    accent-color: var(--color-blue);
    cursor: pointer;
  }

  #voice-status-text {
    font-size: 10px;
    margin-left: auto;
  }

  /* Buttons */
  #buttons {
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #buttons button {
    flex: 1;
    padding: 7px 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px;
    background: rgba(255,255,255,0.04);
    color: var(--color-text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    -webkit-app-region: no-drag;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  #buttons button:hover { background: rgba(255,255,255,0.08); }
  #buttons button:active { background: rgba(255,255,255,0.12); }

  #buttons button.primary {
    background: rgba(136, 170, 255, 0.15);
    border-color: rgba(136, 170, 255, 0.2);
    color: var(--color-blue);
  }

  #buttons button.primary:hover { background: rgba(136, 170, 255, 0.25); }

  /* Section insert button */
  #section-row {
    padding: 0 16px 8px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #section-row button {
    flex: 1;
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    color: var(--color-text-muted);
    font-size: 11px;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }

  #section-row button:hover { background: rgba(255,255,255,0.06); }

  #shortcuts {
    padding: 4px 16px 10px;
    font-size: 10px;
    opacity: 0.3;
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }

  #quit-row {
    padding: 0 16px 10px;
    flex-shrink: 0;
  }

  #quit-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    padding: 4px;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }

  #quit-btn:hover { color: rgba(255,100,100,0.6); }
</style>
</head>
<body>
  <div id="panel">
    <div id="titlebar">
      <span class="icon">&#x2630;</span>
      <h1>Teleprompter</h1>
      <div id="stats">
        <span id="word-count">0 words</span>
        <span id="duration">~0:00</span>
      </div>
    </div>

    <div class="divider"></div>

    <div id="text-area">
      <textarea id="notes" placeholder="Paste your script or talking points here...&#10;&#10;Use --- on its own line to mark section breaks."></textarea>
    </div>

    <div id="section-row">
      <button id="insert-section-btn">&#x2500;&#x2500;&#x2500; Insert Section Break</button>
    </div>

    <!-- Speed -->
    <div id="controls">
      <div class="slider-row">
        <span class="label">&#x1F422;</span>
        <input type="range" id="speed" min="0.3" max="5" step="0.1" value="1.5">
        <span class="label">&#x1F407;</span>
        <span class="value" id="speed-val">1.5</span>
      </div>

      <!-- Font size -->
      <div class="slider-row">
        <span class="label" style="font-size:9px">A</span>
        <input type="range" id="fontSize" min="14" max="40" step="1" value="22">
        <span class="label" style="font-size:15px">A</span>
        <span class="value" id="fontSize-val">22pt</span>
      </div>

      <!-- Opacity -->
      <div class="slider-row">
        <span class="label">&#x25D0;</span>
        <input type="range" id="opacity" min="0.3" max="1" step="0.05" value="0.82">
        <span class="value" id="opacity-val">82%</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Voice tracking -->
    <div id="voice-row">
      <label>
        <input type="checkbox" id="voice-toggle">
        &#x1F3A4; Track by voice
      </label>
      <span id="voice-status-text"></span>
    </div>

    <div class="divider"></div>

    <div id="buttons">
      <button id="play-btn" class="primary">
        <span id="play-icon">&#9654;</span>
        <span id="play-label">Play</span>
      </button>
      <button id="reset-btn">&#x21BA; Reset</button>
      <button id="overlay-btn">
        <span id="overlay-icon">&#x1F441;</span>
        <span id="overlay-label">Show</span>
      </button>
    </div>

    <div id="shortcuts">
      <span>Toggle: &#x2318;&#x21E7;P</span>
    </div>

    <div class="divider"></div>

    <div id="quit-row">
      <button id="quit-btn">Quit Presence</button>
    </div>
  </div>

  <script src="scroll-engine.js"></script>
  <script>
    // ── DOM refs ────────────────────────────────────────────────────────────

    const notesEl = document.getElementById('notes');
    const speedEl = document.getElementById('speed');
    const fontSizeEl = document.getElementById('fontSize');
    const opacityEl = document.getElementById('opacity');
    const speedVal = document.getElementById('speed-val');
    const fontSizeVal = document.getElementById('fontSize-val');
    const opacityVal = document.getElementById('opacity-val');
    const wordCountEl = document.getElementById('word-count');
    const durationEl = document.getElementById('duration');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const playLabel = document.getElementById('play-label');
    const resetBtn = document.getElementById('reset-btn');
    const overlayBtn = document.getElementById('overlay-btn');
    const overlayLabel = document.getElementById('overlay-label');
    const quitBtn = document.getElementById('quit-btn');
    const voiceToggle = document.getElementById('voice-toggle');
    const voiceStatusText = document.getElementById('voice-status-text');
    const insertSectionBtn = document.getElementById('insert-section-btn');

    // ── State ───────────────────────────────────────────────────────────────

    let state = {
      text: '',
      speed: 1.5,
      fontSize: 22,
      opacity: 0.82,
      isScrolling: false,
      scrollOffset: 0,
      voiceTrackingEnabled: false,
      isOverlayVisible: false
    };

    // ── UI update ───────────────────────────────────────────────────────────

    function updateUI() {
      // Only update textarea if it doesn't have focus (avoid cursor jump)
      if (document.activeElement !== notesEl) {
        notesEl.value = state.text;
      }
      speedEl.value = state.speed;
      fontSizeEl.value = state.fontSize;
      opacityEl.value = state.opacity;
      speedVal.textContent = state.speed.toFixed(1);
      fontSizeVal.textContent = state.fontSize + 'pt';
      opacityVal.textContent = Math.round(state.opacity * 100) + '%';

      const words = state.text.trim() ? state.text.trim().split(/\s+/).length : 0;
      wordCountEl.textContent = words + ' words';

      // Duration estimate using ScrollEngine's speaking pace constant
      const durationSec = ScrollEngine.estimateDuration(state.text);
      durationEl.textContent = `~${ScrollEngine.formatTime(durationSec)}`;

      playIcon.textContent = state.isScrolling ? '\u23F8' : '\u25B6';
      playLabel.textContent = state.isScrolling ? 'Pause' : 'Play';
      overlayLabel.textContent = state.isOverlayVisible ? 'Hide' : 'Show';

      voiceToggle.checked = state.voiceTrackingEnabled;
    }

    function sendState(partial) {
      state = { ...state, ...partial };
      updateUI();
      window.presence.updateState({ prompter: partial });
    }

    // ── Input handlers ──────────────────────────────────────────────────────

    notesEl.addEventListener('input', () => {
      sendState({ text: notesEl.value });
    });

    speedEl.addEventListener('input', () => {
      sendState({ speed: parseFloat(speedEl.value) });
    });

    fontSizeEl.addEventListener('input', () => {
      sendState({ fontSize: parseInt(fontSizeEl.value) });
    });

    opacityEl.addEventListener('input', () => {
      sendState({ opacity: parseFloat(opacityEl.value) });
    });

    playBtn.addEventListener('click', () => {
      sendState({ isScrolling: !state.isScrolling });
    });

    resetBtn.addEventListener('click', () => {
      sendState({ scrollOffset: 0, isScrolling: false });
    });

    overlayBtn.addEventListener('click', () => {
      window.presence.toggleOverlay();
    });

    quitBtn.addEventListener('click', () => {
      window.presence.quit();
    });

    // Voice tracking toggle
    voiceToggle.addEventListener('change', async () => {
      const enabled = voiceToggle.checked;
      if (enabled) {
        // Request mic permission first
        const granted = await window.presence.requestMicPermission();
        if (!granted) {
          voiceToggle.checked = false;
          voiceStatusText.textContent = 'Mic denied';
          voiceStatusText.style.color = 'var(--color-red)';
          return;
        }
        voiceStatusText.textContent = 'Listening...';
        voiceStatusText.style.color = 'var(--color-green)';
      } else {
        voiceStatusText.textContent = '';
      }
      sendState({ voiceTrackingEnabled: enabled });
    });

    // Insert section break at cursor position
    insertSectionBtn.addEventListener('click', () => {
      const start = notesEl.selectionStart;
      const end = notesEl.selectionEnd;
      const text = notesEl.value;
      const before = text.substring(0, start);
      const after = text.substring(end);

      // Add newlines around --- if not already present
      const prefix = before.endsWith('\n') || before === '' ? '' : '\n';
      const suffix = after.startsWith('\n') || after === '' ? '' : '\n';
      const insertion = `${prefix}---${suffix}`;

      notesEl.value = before + insertion + after;
      notesEl.selectionStart = notesEl.selectionEnd = start + insertion.length;
      notesEl.focus();
      sendState({ text: notesEl.value });
    });

    // ── State sync from main process ────────────────────────────────────────

    let editorInitialLoad = true;

    window.presence.onStateUpdate((newState) => {
      const prompterState = newState.prompter || {};

      // On initial load, reset ephemeral state to safe defaults
      if (editorInitialLoad) {
        editorInitialLoad = false;
        prompterState.voiceTrackingEnabled = false;
        prompterState.isScrolling = false;
      }

      state = { ...state, ...prompterState };
      updateUI();
    });
  </script>
</body>
</html>
